<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introspoken - Nivell 6: El Bosc Nocturn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="game-container">
        <header class="game-header">
           <button class="btn-tornar" data-tts="Tornar als nivells." onclick="window.location.href='/Nivells/index.html'">⬅️ Tornar</button>
            <h1 tabindex="0" data-tts="Nivell sis: El Bosc Nocturn.">Nivell 6: Bosc Nocturn</h1>
        </header>

        <section class="description-card" tabindex="0" data-tts="La nit ha caigut completament sobre el bosc. L'entorn s'ha tornat fosc i misteriós, inundat d'ombres blaves i negres. Ara els animals del dia dormen, i comença el torn dels de la nit. Escolta amb atenció el cant d'un mussol llunyà i el cruixir de les branques sota la llum de la lluna.">
            <h2>Imagina l'entorn:</h2>
            <p>La nit ha caigut del tot i t'endinses en el <strong>bosc nocturn</strong>, ple de misteri.</p>
            <p>Sota la llum de la lluna, sents el <strong>cant d'un mussol llunyà</strong> i el suau cruixir de les branques de l'alta nit.</p>
        </section>

        <section class="audio-controls">
            <button id="btn-audio" class="btn-play" data-tts="Botó de so. Prem per escoltar els sons del bosc nocturn.">
                <span class="icon">🔊</span> 
                <span class="text">Escotar la so</span>
            </button>
        </section>

        <section id="zona-preguntes" class="quiz-section">
            <h2 id="titol-pregunta" tabindex="0" data-tts="">Pregunta del nivell:</h2>
            <p id="pregunta-text" class="pregunta-text"></p>
            
            <div id="quiz-options" class="quiz-options">
                </div>
        </section>

        <section id="zona-seguent" style="display: none; margin-top: 30px;">
            <button id="btn-seguent" class="btn-seg" data-tts="Felicitats! Has completat el nivell a les fosques." onclick="window.location.href='/Nivells/Nivell 7/index.html'">Anar al Nivell 7</button>
        </section>

        <audio id="sound-effect" src="mussol.mp3" loop></audio>
    </main>

    
</body>
</html>
