<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introspoken - Nivell 2: Els Arbres</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <script src="/jquery-4.0.0.min.js"></script>
</head>
<body>

    <main class="game-container">
        <header class="game-header">
            <button class="btn-tornar" data-tts="Tornar als nivells." onclick="window.location.href='/Nivells/index.html'">⬅️ Tornar</button>
            <h1 tabindex="0" data-tts="Nivell dos: Els Arbres.">Nivell 2: Els Arbres</h1>
        </header>

        <section class="description-card" tabindex="0" data-tts="Imagina l'entorn: camines sobre un mantell de fulles seques que cruixen sota els teus peus amb un so trencadís. Al teu voltant, troncs gruixuts i rústics s'alcen cap al cel. Una brisa suau bufa constantment, fent que les capçades dels arbres es balancegin i les fulles xiuxiuegin una melodia verda i acollidora.">
            <h2>Imagina l'entorn:</h2>
            <p>Camines sobre un mantell de <strong>fulles seques que cruixen</strong> sota els teus peus. Al teu voltant, troncs gruixuts s'alcen cap al cel.</p>
            <p>Una brisa suau fa que les capçades dels arbres es balancegin i les fulles <strong>xiuxiuegin una melodia</strong> acollidora.</p>
        </section>

        <section class="audio-controls">
            <button id="btn-audio" class="btn-play" data-tts="Botó de so. Prem per escoltar-ho.">
                <span class="icon">🔊</span> 
                <span class="text">Escoltar el so</span>
            </button>
        </section>

        <section id="zona-preguntes" class="quiz-section">
            <h2 id="titol-pregunta" tabindex="0" data-tts="">Pregunta del nivell:</h2>
            <p id="pregunta-text" class="pregunta-text"></p>
            
            <div id="quiz-options" class="quiz-options">
                </div>
        </section>

        <section id="zona-seguent" style="display: none; margin-top: 30px;">
            <button id="btn-seguent" class="btn-seg" data-tts="Felicitats! Has encertat. Prem aquí per tornar al camí de nivells." onclick="window.location.href='/Nivells/Nivell 3/index.html'">Anar al Nivell 3</button>
        </section>

        <audio id="sound-effect" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" loop></audio>
    </main>

    
</body>
</html>
