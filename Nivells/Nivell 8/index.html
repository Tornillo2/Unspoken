<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introspoken - Nivell 8: El Món dels Insectes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="game-container">
        <header class="game-header">
            <button class="btn-tornar" data-tts="Tornar als nivells." onclick="window.location.href='/Nivells/index.html'">⬅️ Tornar</button>
            <h1 tabindex="0" data-tts="Nivell vuit: El Món dels Insectes.">Nivell 8: Els Insectes</h1>
        </header>

        <section class="description-card" tabindex="0" data-tts="Si t'ajups i escoltes amb atenció prop de l'herba, descobriràs un món ple de vibracions. Sents el zumzeig constant de les abelles buscant pol·len i el cric-cric rítmic d'un grill amagat sota una fulla seca. Milers de potes diminutes es mouen entre la molsa, creant la banda sonora més petita del bosc.">
            <h2>Imagina l'entorn:</h2>
            <p>Baixes la mirada cap a l'herba, on la <strong>vida microscòpica</strong> no s'atura mai.</p>
            <p>L'aire vibra amb el <strong>zumzeig de les abelles</strong> i el famós cant rascant dels grills entre la molsa humida.</p>
        </section>

        <section class="audio-controls">
            <button id="btn-audio" class="btn-play" data-tts="Botó de so. Prem per escoltar el zumzeig i el cant dels insectes.">
                <span class="icon">🔊</span> 
                <span class="text">Escotar els so</span>
            </button>
        </section>

        <section id="zona-preguntes" class="quiz-section">
            <h2 id="titol-pregunta" tabindex="0" data-tts="">Pregunta del nivell:</h2>
            <p id="pregunta-text" class="pregunta-text"></p>
            
            <div id="quiz-options" class="quiz-options">
                </div>
        </section>

        <section id="zona-seguent" style="display: none; margin-top: 30px;">
            <button id="btn-seguent" class="btn-seg" data-tts="Molt bé! Has descobert el món dels insectes. Prem per continuar l'aventura." onclick="window.location.href='/Nivells/Nivell 9/index.html'">Anar al Nivell 9</button>
        </section>

        <audio id="sound-effect" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" loop></audio>
    </main>

    
</body>
</html>
