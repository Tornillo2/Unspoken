<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introspoken - Nivell 10: El Gran Repàs Final</title>
    <link rel="stylesheet" href="style.css">
    <script src="/jquery-4.0.0.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>

    <main class="game-container">
        <header class="game-header">
            <button class="btn-tornar" data-tts="Tornar als nivells." onclick="window.location.href='/Nivells/index.html'">⬅️ Tornar</button>
            <h1 tabindex="0" data-tts="Nivell deu: El Gran Repàs de tot el camí.">Nivell 10: Gran Repàs</h1>
        </header>

        <section class="description-card" tabindex="0" data-tts="Benvingut a la prova final. Aquí respondries una pregunta de cada un dels nivells que has superat. Demostra que recordes la veu de l'aigua, el cant dels ocells, el pas dels grans animals i la força de la tempesta per convertir-te en Guardià de la Natura.">
            <h2>La Gran Prova:</h2>
            <p>Has de respondre **una pregunta de cada nivell** per completar el teu entrenament.</p>
            <p>Són 9 preguntes en total. Bona sort, explorador!</p>
        </section>

        <section id="zona-preguntes" class="quiz-section">
            <div class="quiz-container">
                <h2 class="num-pregunta" id="num-pregunta-titol" tabindex="0" data-tts="">Carregant nivells...</h2>
                <p class="pregunta-text" id="pregunta-text" tabindex="0" data-tts=""></p>
                <div class="quiz-options" id="quiz-options">
                    </div>
            </div>
        </section>

        <section id="zona-seguent" style="display: none; margin-top: 30px;">
            <div class="victoria-box">
                <span class="🏆" style="font-size: 4rem;">👑</span>
                <h2>Has completat el Gran Repàs!</h2>
                <p>Has demostrat ser un autèntic expert en tots els sons de la natura.</p>
            </div>
            <button id="btn-seguent" class="btn-seg" data-tts="Felicitats! Prem aquí per acabar el joc del tot.">Finalitzar Joc 🏁</button>
        </section>

    </main>
</body>
</html>
