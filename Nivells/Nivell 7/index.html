<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introspoken - Nivell 7: Els Grans Animals</title>
    <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    <script src="/jquery-4.0.0.min.js"></script>
</head>
<body>

    <main class="game-container">
        <header class="game-header">
            <button class="btn-tornar" data-tts="Tornar als nivells." onclick="window.location.href='/Nivells/index.html'">⬅️ Tornar</button>
            <h1 tabindex="0" data-tts="Nivell set: Els Grans Animals del Bosc.">Nivell 7: Grans Animals</h1>
        </header>

        <section class="description-card" tabindex="0" data-tts="T'endinses en una zona del bosc on la vegetació és més espessa i els arbres són centenaris. Aquest és el refugi dels grans animals. Si fiques atenció, podràs escoltar el bram potent d'un cérvol amagat entre les ombres o el cruixir de branques gruixudes quan un gran os es mou decidit a buscar menjar.">
            <h2>Imagina l'entorn:</h2>
            <p>Arribes a una zona densa de <strong>veus i arbres centenaris</strong>, el lloc preferit dels grans mamífers.</p>
            <p>Es percep la majestuositat de la natura: sents el <strong>bram potent d'un cérvol</strong> i el trencament de branques per trepitjades fortes.</p>
        </section>

        <section class="audio-controls">
            <button id="btn-audio" class="btn-play" data-tts="Botó de so. Prem per escoltar la força dels grans animals del bosc.">
                <span class="icon">🔊</span> 
                <span class="text">Escotar els so</span>
            </button>
        </section>

        <section id="zona-preguntes" class="quiz-section">
            <h2 id="titol-pregunta" tabindex="0" data-tts="">Pregunta del nivell:</h2>
            <p id="pregunta-text" class="pregunta-text"></p>
            
            <div id="quiz-options" class="quiz-options">
                </div>
        </section>

        <section id="zona-seguent" style="display: none; margin-top: 30px;">
            <button id="btn-seguent" class="btn-seg" data-tts="Molt bé! Has conegut els grans animals de prop. Prem per seguir avançant." onclick="window.location.href='final.html'">Anar al Nivell 8</button>
        </section>

        <audio id="sound-effect" src="cervol.mp3" loop></audio>
    </main>

    
</body>
</html>
