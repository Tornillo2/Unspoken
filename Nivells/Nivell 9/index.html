    <main class="game-container">

            <button id="btn-seguent" class="btn-seg" data-tts="Increïble! Has superat la tempesta. Prem per continuar cap a l'últim tram del viatge." onclick="window.location.href='/Nivells/Nivell 10/index.html'">Continuar Viatge ➡️</button>
