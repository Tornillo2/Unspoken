<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introspoken - Nivell 4: El Cel i el Vent</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <script src="/jquery-4.0.0.min.js"></script>
</head>
<body>

    <main class="game-container">
        <header class="game-header">
            <button class="btn-tornar" data-tts="Tornar als nivells." onclick="window.location.href='/Nivells/index.html'">⬅️ Tornar</button>
            <h1 tabindex="0" data-tts="Nivell quatre: El Cel i el Vent.">Nivell 4: El Cel</h1>
        </header>

        <section class="description-card" tabindex="0" data-tts="Has arribat a una clariana dalt de tot. Aquí els arbres deixen pas a un cel infinit. Sents com el vent bufa amb força, una carícia freda i constant que xiula a les teves orelles. És l'aire pur de la llibertat, l'últim pas del nostre viatge.">
            <h2>Imagina l'entorn:</h2>
            <p>Dalt de tot, els arbres deixen pas a un <strong>cel infinit</strong>.</p>
            <p>Sents com el <strong>vent bufa amb força</strong>, xiulant a les teves orelles amb aire pur i fresc.</p>
        </section>

        <section class="audio-controls">
            <button id="btn-audio" class="btn-play" data-tts="Botó de so. Prem per escoltar la força del vent.">
                <span class="icon">🔊</span> 
                <span class="text">Escotar el so</span>
            </button>
        </section>

        <section id="zona-preguntes" class="quiz-section">
            <h2 id="titol-pregunta" tabindex="0" data-tts="">Pregunta del nivell:</h2>
            <p id="pregunta-text" class="pregunta-text"></p>
            
            <div id="quiz-options" class="quiz-options">
                </div>
        </section>

        <section id="zona-seguent" style="display: none; margin-top: 30px;">
            <button id="btn-seguent" class="btn-seg" data-tts="Felicitats! Has encertat. Prem aquí per anar al Nivell quatre." onclick="window.location.href='nivell4.html'">Anar al Nivell 4 ➡️</button>
        </section>

        <audio id="sound-effect" src="vent.mp3" loop></audio>
    </main>

</body>
</html>
