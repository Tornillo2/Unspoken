<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Eco de la Natura - Menú Principal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="menu-container">
        <header class="menu-header">
            <h1>L'Eco de la Natura</h1>
            <p>Benvingut/da. Selecciona una opció per començar el teu viatge sonor.</p>
        </header>

        <nav class="menu-options">
            <button class="menu-btn o-aprenentatge" aria-label="Opció 1: El Despertar dels Sentits. Mode Aprenentatge.">
                <span class="icon">🌲</span>
                <span class="text">1. El Despertar dels Sentits</span>
                <span class="subtext">Aprèn els sons de la natura un per un.</span>
            </button>

            <button class="menu-btn o-repte" aria-label="Opció 2: El Repte del Bosc. Prova Final.">
                <span class="icon">🦉</span>
                <span class="text">2. El Repte del Bosc</span>
                <span class="subtext">Escolta el bosc, identifica els sons i relaxa't.</span>
            </button>

            <button class="menu-btn o-calma" aria-label="Opció 3: El Racó de la Calma. Mode Relax.">
                <span class="icon">💧</span>
                <span class="text">3. El Racó de la Calma</span>
                <span class="subtext">Sons continus per meditar o descansar.</span>
            </button>

            <button class="menu-btn o-ajuda" aria-label="Opció 4: Com es juga? Instruccions de veu.">
                <span class="icon">🔊</span>
                <span class="text">4. Com es juga?</span>
                <span class="subtext">Escolta les instruccions del joc.</span>
            </button>
        </nav>
    </main>

</body>
</html>
