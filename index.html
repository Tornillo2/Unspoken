<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape Room</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Arial', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url('');
    background-size:cover;
    background-position:center;
    color:white;
}

.container{
    text-align:center;
    padding:40px;
    background:rgba(0,0,0,0.55);
    border:2px solid #00ffcc;
    border-radius:20px;
    backdrop-filter: blur(8px);
    box-shadow:0 0 30px rgba(0,255,204,0.4);
}

h1{
    font-size:4rem;
    margin-bottom:15px;
    text-transform:uppercase;
    letter-spacing:4px;
    color:#00ffcc;
    text-shadow:0 0 15px #00ffcc;
}

p{
    font-size:1.2rem;
    margin-bottom:30px;
    color:#ddd;
}

button{
    padding:15px 40px;
    font-size:1.1rem;
    border:none;
    border-radius:50px;
    background:#00ffcc;
    color:#111;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px #00ffcc;
}

.subtitle{
    margin-top:10px;
    font-style:italic;
    color:#aaa;
}
</style>
</head>
<body>

<div class="container">
    <h1>Unspoken</h1>
    <p>En Manel ha agafat un atac d'engoixa abans de tindre una reunió important, l'has de tranquilitar i ajudar a sortir del seu despatx perquè pugi arribar a la seva reunió tranquil</p>

    <button onclick="startGame()">Començar</button>

    <div class="subtitle">
        Tens 15 minuts per escapar...
    </div>
</div>

<script>
function startGame() {
    // contador
    window.location.href = "start.html";
}
</script>

</body>
</html>
